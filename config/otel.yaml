receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Add metadata about the environment
  resource:
    attributes:
      - key: service.name
        value: ai4dev
        action: insert
      - key: deployment.environment
        value: local
        action: insert

exporters:
  debug:
    verbosity: normal

  # Export to Langfuse
  otlphttp/langfuse:
    endpoint: http://langfuse-web:3000/api/public/traces
    headers:
      x-langfuse-public-key: ${LANGFUSE_PUBLIC_KEY}
    compression: gzip

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug, otlphttp/langfuse]

    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
