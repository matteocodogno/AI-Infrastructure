model_list:
  # ============================================
  # ROLE: Code Writer (Creative, Contextual)
  # ============================================
  - model_name: writer
    litellm_params:
      model: claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      temperature: 0.3
      max_tokens: 4096
    model_info:
      mode: chat
      supports_function_calling: true
      supports_vision: false

  # Fallback for writer role
  - model_name: writer-fallback
    litellm_params:
      model: gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      temperature: 0.3

  # ============================================
  # ROLE: Code Reviewer (Analytical, Critical)
  # ============================================
  - model_name: reviewer
    litellm_params:
      model: gpt-4-turbo
      api_key: os.environ/OPENAI_API_KEY
      temperature: 0.1  # More deterministic
      max_tokens: 2048
    model_info:
      mode: chat
      supports_function_calling: true

  # Fallback for reviewer role
  - model_name: reviewer-fallback
    litellm_params:
      model: claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      temperature: 0.1

  # ============================================
  # ROLE: Architect (Reasoning, Documentation)
  # ============================================
  - model_name: architect
    litellm_params:
      model: gemini/gemini-2.0-flash-exp
      api_key: os.environ/GEMINI_API_KEY
      temperature: 0.2
      max_tokens: 8192
    model_info:
      mode: chat
      supports_function_calling: true

  # Fallback for architect role
  - model_name: architect-fallback
    litellm_params:
      model: claude-opus-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      temperature: 0.2

  # ============================================
  # ROLE: Test Generator (Comprehensive, Edge Cases)
  # ============================================
  - model_name: tester
    litellm_params:
      model: gpt-4-turbo
      api_key: os.environ/OPENAI_API_KEY
      temperature: 0.4
      max_tokens: 3072

  # Fallback for tester role
  - model_name: tester-fallback
    litellm_params:
      model: gemini/gemini-2.0-flash-exp
      api_key: os.environ/GEMINI_API_KEY
      temperature: 0.4

  # ============================================
  # ROLE: Commit Message Writer (Concise, Conventional)
  # ============================================
  - model_name: committer
    litellm_params:
      model: gpt-4o-mini  # Fast & cheap for simple tasks
      api_key: os.environ/OPENAI_API_KEY
      temperature: 0.1
      max_tokens: 256
    model_info:
      mode: chat
      supports_function_calling: true

  # ============================================
  # ROLE: Refactorer (Structure, Patterns)
  # ============================================
  - model_name: refactorer
    litellm_params:
      model: claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      temperature: 0.2
      max_tokens: 4096

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  num_retries: 2
  request_timeout: 300

  # Fallback routing
  fallbacks: [
    # Writer role fallbacks
    {"writer": ["writer-fallback"]},  # Uses multiple writer configs

    # Reviewer role fallbacks
    {"reviewer": ["reviewer-fallback"]},

    # Architect role fallbacks
    {"architect": ["architect-fallback"]},

    # Tester role fallbacks
    {"tester": ["tester-fallback"]},

    # Cross-role fallback (emergency)
    {"writer": ["reviewer", "architect"]},
    {"reviewer": ["writer", "architect"]},
    {"architect": ["writer", "reviewer"]},
    {"tester": ["writer", "reviewer", "architect"]},
  ]

  # Cost tracking per role
  max_budget: 100  # USD per month
  budget_duration: 30d

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  # Langfuse integration
  langfuse_public_key: os.environ/LANGFUSE_PUBLIC_KEY
  langfuse_secret_key: os.environ/LANGFUSE_SECRET_KEY
  langfuse_host: os.environ/LANGFUSE_HOST